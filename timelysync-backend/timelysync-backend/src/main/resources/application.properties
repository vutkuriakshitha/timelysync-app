# Server Configuration
server.port=${PORT:8080}

# MongoDB Atlas Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/timelysync}
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
timelysync.app.jwtSecret=${JWT_SECRET:timelysync-dev-secret-change-this-before-production}
timelysync.app.jwtExpirationMs=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.timelysync=INFO
logging.level.org.mongodb.driver=WARN

# Email Verification
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
timelysync.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@timelysync.app}}

# Smart Intake
timelysync.smart-intake.tesseract-cmd=${SMARTINTAKE_TESSERACT_CMD:tesseract}
